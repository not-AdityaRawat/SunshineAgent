worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        # We listen on port 80 (HTTP) to intercept traffic
        listen       80;
        server_name  localhost;

        location / {
            # Proxy to moonlight-web-stream
            proxy_pass http://127.0.0.1:8080;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Crucial: Strip security headers that block iframes
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            
            # Inject CSS to hide the settings icon and auto-login logic
            # Note: You may need to inspect the moonlight-web-stream localStorage keys to perfect the JS injection.
            sub_filter '</head>' '<style>.settings-btn-class { display: none !important; }</style>
            <script>
                // Auto-fill the host if not set
                if (!localStorage.getItem("moonlight_host")) {
                    localStorage.setItem("moonlight_host", "127.0.0.1");
                }
                // Optional: Auto-fill token if you know how it stores it
            </script></head>';
            sub_filter_once on;
        }
    }
}
