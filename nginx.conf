worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        # We listen on port 80 (HTTP) to intercept traffic
        listen       80;
        server_name  localhost;

        location / {
            # Proxy to moonlight-web-stream
            proxy_pass http://127.0.0.1:8080;
            
            # Pass Original Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Crucial: Strip security headers that block iframes
            proxy_hide_header X-Frame-Options;
            proxy_hide_header Content-Security-Policy;
            
            # Inject JS to Auto-Login and auto-fill host
            sub_filter '</head>' '<style>.settings-btn-class { display: none !important; }</style><script>
            if (!localStorage.getItem("moonlight_host")) { localStorage.setItem("moonlight_host", "127.0.0.1"); }
            var autoLogin = setInterval(function() {
                var inputs = document.querySelectorAll("input");
                if(inputs.length >= 2 && inputs[0].type === "text" && inputs[1].type === "password") {
                    var u = inputs[0];
                    var p = inputs[1];
                    var btn = Array.from(document.querySelectorAll("button")).find(b => b.textContent.trim() === "Ok" || b.textContent.trim() === "Login");
                    if(u && p && btn && u.value === "") {
                        var setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
                        setter.call(u, "admin"); u.dispatchEvent(new Event("input", {bubbles:true}));
                        setter.call(p, "20216401523"); p.dispatchEvent(new Event("input", {bubbles:true}));
                        btn.click();
                        clearInterval(autoLogin);
                    }
                }
            }, 300);
            </script></head>';
            sub_filter_once on;
        }
    }
}
